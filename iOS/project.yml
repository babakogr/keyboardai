name: KeyboardAI
options:
  bundleIdPrefix: com.keyboardai
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_BITCODE: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    GCC_OPTIMIZATION_LEVEL: "0"

configs:
  Debug: debug
  Release: release

targets:

  # ─────────────────────────────────────
  # MAIN APP TARGET
  # ─────────────────────────────────────
  KeyboardAI:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    bundleId: com.keyboardai.app

    info:
      path: KeyboardAI/App/Info.plist
      properties:
        CFBundleDisplayName: KeyboardAI
        CFBundleName: KeyboardAI
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false

    entitlements:
      path: KeyboardAI/App/KeyboardAI.entitlements

    sources:
      - path: KeyboardAI/App
        excludes:
          - "Info.plist"
          - "*.entitlements"
      - path: KeyboardAI/Shared

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.keyboardai.app
        PRODUCT_NAME: KeyboardAI
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""

    dependencies: []

  # ─────────────────────────────────────
  # KEYBOARD EXTENSION TARGET
  # ─────────────────────────────────────
  KeyboardExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    bundleId: com.keyboardai.app.keyboard

    info:
      path: KeyboardAI/KeyboardExtension/Info.plist
      properties:
        CFBundleDisplayName: KeyboardAI
        CFBundleName: KeyboardAI Keyboard
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: true
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: true
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController

    entitlements:
      path: KeyboardAI/KeyboardExtension/KeyboardExtension.entitlements

    sources:
      - path: KeyboardAI/KeyboardExtension
        excludes:
          - "Info.plist"
          - "*.entitlements"
      - path: KeyboardAI/Shared

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.keyboardai.app.keyboard
        PRODUCT_NAME: KeyboardExtension
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""

    dependencies:
      - embed: false
        target: KeyboardAI
