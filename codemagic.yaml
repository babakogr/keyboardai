workflows:
  ios-development:
    name: KeyboardAI iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: development
        bundle_identifier: com.keyboardai.app
      vars:
        XCODE_PROJECT: "iOS/KeyboardAI.xcodeproj"
        XCODE_SCHEME: "KeyboardAI"
        BUNDLE_ID: "com.keyboardai.app"
        KEYBOARD_BUNDLE_ID: "com.keyboardai.app.keyboard"
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Install dependencies (if any)
        script: |
          cd iOS
          if [ -f "Podfile" ]; then
            pod install
          fi

      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  ios-testflight:
    name: KeyboardAI TestFlight Deploy
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic_api_key

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.keyboardai.app
      vars:
        XCODE_PROJECT: "iOS/KeyboardAI.xcodeproj"
        XCODE_SCHEME: "KeyboardAI"
      xcode: latest

    scripts:
      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build iOS app for App Store
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
