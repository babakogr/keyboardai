workflows:

  # ─────────────────────────────────────────────────────────────────
  # WORKFLOW 1: Simulator build — NO signing needed, free to run
  # Use this first to verify the project compiles correctly
  # ─────────────────────────────────────────────────────────────────
  ios-simulator:
    name: KeyboardAI Simulator Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      vars:
        XCODE_PROJECT: "iOS/KeyboardAI.xcodeproj"
        XCODE_SCHEME: "KeyboardAI"
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Build for simulator (no signing)
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build \
            | xcpretty

    artifacts:
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────────────────────────
  # WORKFLOW 2: Real device .ipa — needs Apple Developer account
  # Connect Apple Developer in Codemagic → Team → Integrations first
  # ─────────────────────────────────────────────────────────────────
  ios-development:
    name: KeyboardAI Device Build (IPA)
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic_api_key

    environment:
      ios_signing:
        distribution_type: development
        bundle_identifier: com.keyboardai.app
      vars:
        XCODE_PROJECT: "iOS/KeyboardAI.xcodeproj"
        XCODE_SCHEME: "KeyboardAI"
      xcode: latest

    scripts:
      - name: Set up automatic code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA for device
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────────────────────────
  # WORKFLOW 3: TestFlight — needs Apple Developer + App Store Connect
  # ─────────────────────────────────────────────────────────────────
  ios-testflight:
    name: KeyboardAI TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic_api_key

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.keyboardai.app
      xcode: latest
      vars:
        XCODE_PROJECT: "iOS/KeyboardAI.xcodeproj"
        XCODE_SCHEME: "KeyboardAI"

    scripts:
      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build for App Store
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
