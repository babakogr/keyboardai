workflows:

  # ─────────────────────────────────────────────────────────────────
  # WORKFLOW 1: Simulator build — NO signing needed, free to run
  # Uses XcodeGen to auto-generate the real .xcodeproj from project.yml
  # ─────────────────────────────────────────────────────────────────
  ios-simulator:
    name: KeyboardAI Simulator Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      vars:
        XCODE_PROJECT: "iOS/KeyboardAI.xcodeproj"
        XCODE_SCHEME: "KeyboardAI"
      xcode: "16.3"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project from spec
        script: |
          cd iOS
          xcodegen generate --spec project.yml
          echo "✅ Xcode project generated successfully"
          ls -la KeyboardAI.xcodeproj/

      - name: Build for simulator (no signing)
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build \
            | xcpretty

    artifacts:
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - kibrisdiscovery@gmail.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────────────────────────
  # WORKFLOW 2: Unsigned IPA — NO Apple Developer account needed
  # Download the .ipa → sign with Sideloadly (free Apple ID) → install
  # ─────────────────────────────────────────────────────────────────
  ios-unsigned-ipa:
    name: KeyboardAI Unsigned IPA (Sideloadly)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      vars:
        XCODE_PROJECT: "iOS/KeyboardAI.xcodeproj"
        XCODE_SCHEME: "KeyboardAI"
      xcode: "16.3"

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project from spec
        script: |
          cd iOS
          xcodegen generate --spec project.yml

      - name: Generate placeholder AppIcon
        script: |
          python3 iOS/generate_icon.py

      - name: Build unsigned IPA for real device
        script: |
          # Build for real device without signing
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -derivedDataPath build \
            clean build

      - name: Package into .ipa file
        script: |
          # Find the .app and package it as .ipa
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r KeyboardAI-unsigned.ipa Payload/
          rm -rf Payload
          echo "✅ IPA created: KeyboardAI-unsigned.ipa"
          ls -lh KeyboardAI-unsigned.ipa

    artifacts:
      - KeyboardAI-unsigned.ipa

    publishing:
      email:
        recipients:
          - kibrisdiscovery@gmail.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────────────────────────
  # WORKFLOW 3: Real device .ipa — needs Apple Developer account
  # Connect Apple Developer in Codemagic → Team → Integrations first
  # ─────────────────────────────────────────────────────────────────
  ios-development:
    name: KeyboardAI Device Build (IPA)
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic_api_key

    environment:
      ios_signing:
        distribution_type: development
        bundle_identifier: com.keyboardai.app
      vars:
        XCODE_PROJECT: "iOS/KeyboardAI.xcodeproj"
        XCODE_SCHEME: "KeyboardAI"
      xcode: "16.3"

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project from spec
        script: |
          cd iOS
          xcodegen generate --spec project.yml

      - name: Set up automatic code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA for device
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────────────────────────
  # WORKFLOW 3: TestFlight — needs Apple Developer + App Store Connect
  # ─────────────────────────────────────────────────────────────────
  ios-testflight:
    name: KeyboardAI TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic_api_key

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.keyboardai.app
      xcode: "16.3"
      vars:
        XCODE_PROJECT: "iOS/KeyboardAI.xcodeproj"
        XCODE_SCHEME: "KeyboardAI"

    scripts:
      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build for App Store
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
